AWSTemplateFormatVersion: '2010-09-09'
Description: 'Golden Path: Secure S3 Bucket for Application Logs (Day 1.1)'

Parameters:
  BucketPrefix:
    Type: String
    Default: 'cnc-logs'
  Environment:
    Type: String
    Default: 'dev'
  OwnerEmail:
    Type: String

Resources:
  AppLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketPrefix}-${AWS::AccountId}-${Environment}'
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: ManagedBy
          Value: PlatformTeam
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerEmail

Outputs:
  BucketArn:
    Value: !GetAtt AppLogBucket.Arn
